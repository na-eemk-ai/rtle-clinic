<script>
/* =========================================================================
   RTLE — Health Information System Core
   ========================================================================= */

const store = {
  get(k, d) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch(e){ return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
};

// จัดการคลังข้อมูลผ่าน Supabase ร่วมกับ LocalStorage สำรอง
const DB = {
  async patients() {
    if (IS_ONLINE) {
      try {
        const { data, error } = await sb.from('patients').select('*').order('hn', { ascending: true });
        if (!error && data) return data;
      } catch(e) { console.error(e); }
    }
    return store.get('rtle_patients', []);
  },
  
  async savePatients(pList) {
    store.set('rtle_patients', pList);
    if (IS_ONLINE) {
      try {
        for(let p of pList) {
          await sb.from('patients').upsert({
            id: p.id, hn: p.hn, name: p.name, sex: p.sex, birth: p.birth, constitution: p.constitution
          });
        }
      } catch(e) { console.error("Cloud Save Patients Error:", e); }
    }
  },

  async assessments() {
    if (IS_ONLINE) {
      try {
        const { data, error } = await sb.from('assessments').select('*').order('created_at', { ascending: false });
        if (!error && data) {
          return data.map(r => ({
            ...r.data, id: r.id, hn: r.hn, name: r.name, rsi: r.rsi
          }));
        }
      } catch(e) { console.error(e); }
    }
    return store.get('rtle_assessments', []);
  },

  async saveAssessments(updatedList) {
    store.set('rtle_assessments', updatedList);
    const latest = updatedList[0];
    if (!latest) return;
    if (IS_ONLINE) {
      try {
        await sb.from('assessments').insert({
          id: latest.id,
          hn: latest.hn,
          name: latest.name,
          rsi: latest.rsi,
          data: latest
        });
      } catch(e) { console.error("Cloud Save Assessment Error:", e); }
    }
  },

  session() { return store.get('rtle_session', null); },
  saveSession(s) { store.set('rtle_session', s); }
};

async function checkConnection() {
  if(!sb) return false;
  try {
    const { data, error } = await sb.from('patients').select('id').limit(1);
    if(error) throw error;
    IS_ONLINE = true;
  } catch(e) {
    console.warn("Supabase Mode Offline:", e.message);
    IS_ONLINE = false;
  }
  updateConnectionUI();
  return IS_ONLINE;
}

function updateConnectionUI() {
  const el = document.getElementById('connection-status');
  if(!el) return;
  if(IS_ONLINE) {
    el.className = 'status-pill online';
    el.innerHTML = '<div class="status-dot"></div> ระบบออนไลน์';
  } else {
    el.className = 'status-pill offline';
    el.innerHTML = '<div class="status-dot"></div> ระบบออฟไลน์';
  }
}

async function go(route) {
  CURRENT_ROUTE = route;
  document.querySelectorAll('#nav-bar a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('onclick').includes(`'${route}'`));
  });
  
  const renderMap = {
    dashboard: renderDashboard,
    patients: renderPatients,
    assess: renderAssess,
    records: renderRecords,
    about: renderAbout
  };
  
  if (renderMap[route]) {
    await renderMap[route]();
  }
  document.getElementById('view').scrollTop = 0;
}

function flash(msg) {
  const f = document.getElementById('flash');
  f.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> ${msg}`;
  f.style.display = 'flex';
  setTimeout(() => f.style.display = 'none', 3000);
}

function getElKey(thStr) {
  if(!thStr) return 'earth';
  if(thStr.includes('ดิน')) return 'earth';
  if(thStr.includes('น้ำ')) return 'water';
  if(thStr.includes('ลม')) return 'wind';
  if(thStr.includes('ไฟ')) return 'fire';
  return 'earth';
}

function uid(prefix='') { return prefix + Math.random().toString(36).substring(2,11) + Date.now().toString(36).substring(4); }

function emptyBox(t,s) {
  return `<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 13h6M9 17h6M9 9h1"/><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/></svg>

}

function autoCalcConstitution() {
  const bVal = $('#p-birth').value; if(!bVal) return;
  const m = new Date(bVal).getMonth() + 1;
  let con = 'ดิน';
  if([6,7,8].includes(m)) con = 'น้ำ';
  else if([9,10,11].includes(m)) con = 'ลม';
  else if([12,1,2].includes(m)) con = 'ไฟ';
  $('#p-constitution').value = con;
}

async function savePatient(e) {
  e.preventDefault();
  const P = await DB.patients();
  const id = $('#p-id').value || uid('p_');
  const hn = $('#p-hn').value;
  const name = $('#p-name').value;
  const sex = $('input[name="p-sex"]:checked').value;
  const birth = $('#p-birth').value;
  const constitution = $('#p-constitution').value;

  const idx = P.findIndex(p => p.id === id);
  const newP = { id, hn, name, sex, birth, constitution };
  
  if(idx > -1) P[idx] = newP;
  else P.push(newP);

  await DB.savePatients(P);
  flash('บันทึกข้อมูลผู้ป่วยเข้าระบบเรียบร้อยแล้ว');
  resetPatientForm();
  await renderPatients();
}

  ANSWERS = {};
  renderAssess();
}

function setScore(qId, score) {
  ANSWERS[qId] = score;
  const block = document.getElementById(`q-block-${qId}`);
  if(block) {
    block.querySelectorAll('.choice-box').forEach((box, i) => {
      box.classList.toggle('active', (i + 1) === score);
    });
  }
}

async function computeResult() {
  const unanswered = QUESTIONS.filter(q => !ANSWERS[q.id]);
  if(unanswered.length > 0) {
    alert(`กรุณากรอกข้อถามให้ครบทุกสัญญะก่อนคำนวณครับ (ยังเหลืออีก ${unanswered.length} ข้อ)`);
    const target = document.getElementById(`q-block-${unanswered[0].id}`);
    if(target) target.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  // คำนวณหาคะแนนดิบรายกลุ่มธาตุ (สเกลสูงสุด 25 คะแนนต่อหนึ่งกองธาตุ)
  const raw = { earth:0, water:0, wind:0, fire:0 };
  QUESTIONS.forEach(q => { raw[q.element] += ANSWERS[q.id]; });

  // แปลงคะแนนดิบเป็นค่าดัชนีกองธาตุสะสม (C-Index ระหว่างช่วง 0.0 - 1.0)
  const pct = {};
  ELEMENTS.forEach(el => {
    pct[el] = raw[el] / 25;
  });

  // คำนวณหาค่าระยะห่างเพื่อแปลงหาดัชนี RSI สุขภาพแบบจำลองคณิตศาสตร์
  let totalD2 = 0;
  ELEMENTS.forEach(el => {
    totalD2 += Math.pow(pct[el], 2);
  });
  const meanD2 = totalD2 / 4;
  const rsiValue = Math.exp(-7 * meanD2) * 100; // แปลงให้ออกมาเป็นสเกลเปอร์เซ็นต์เต็ม 100

  let statusText = 'โครงสร้างสภาวะสมดุลสมบูรณ์ดี (Excellent Balance)';
  if(rsiValue < 55) statusText = 'ระบบธาตุเสียสมดุลร้ายแรงวิกฤต (Severe Imbalance)';
  else if(rsiValue < 75) statusText = 'พบสัญญาณความแปรปรวนชัดเจน (Moderate Imbalance)';
  else if(rsiValue < 90) statusText = 'สภาวะเอนเอียงขาดสมดุลเล็กน้อย (Mild Imbalance)';

  let maxScore = -1, dominant = 'earth';
  ELEMENTS.forEach(el => {
    if(raw[el] > maxScore) { maxScore = raw[el]; dominant = el; }
  });

  const dominantTh = { earth:'ดิน', water:'น้ำ', wind:'ลม', fire:'ไฟ' }[dominant];

  const rec = {
    id: uid('rec_'),
    patientId: CURRENT_PATIENT.id,
    hn: CURRENT_PATIENT.hn,
    name: CURRENT_PATIENT.name,
    date: new Date().toISOString(),
    raw, pct, rsi: rsiValue, statusText, dominantTh,
    answers: ANSWERS
  };

  const A = await DB.assessments();
  A.unshift(rec);
  await DB.saveAssessments(A);

  LAST_RESULT = rec;
  ASSESS_STEP = 3;
  renderAssess();
}

async function viewResult(id) {
  const allA = await DB.assessments();
  LAST_RESULT = allA.find(a => a.id === id);
  if(!LAST_RESULT) return;
  const listP = await DB.patients();
  CURRENT_PATIENT = listP.find(p => p.id === LAST_RESULT.patientId) || { name:LAST_RESULT.name, hn:LAST_RESULT.hn };
  ASSESS_STEP = 3;
  go('assess');
}

async function exportCSV() {
  const A = await DB.assessments();
  if(!A.length) { flash('ไม่พบข้อมูลประวัติให้ออกรายงาน'); return; }
  
  let csv = '\uFEFFวันที่ตรวจคัดกรอง,HN,ชื่อผู้รับการประเมิน,ดัชนีความสมดุล RSI,กองธาตุแปรปรวนสูงสุด,สรุปแปรผลทางการแพทย์\n';
  A.forEach(a => {
    csv += `"${new Date(a.date).toLocaleString('th-TH')}"`,
    csv += `,"${a.hn}","${a.name}","${(a.rsi||0).toFixed(1)}%","${a.dominantTh}","${a.statusText}"\n`;
  });

  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.setAttribute('download', `RTLE_Data_Report_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
