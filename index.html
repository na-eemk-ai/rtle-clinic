<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RTLE Platform — Resonance of Thai Life Elements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* 1. BRANDING & THEME SETTINGS */
:root {
  --brand: #124D45;
  --brand2: #0E5C63;
  --brand-tint: #E7F0EE;
  --brand-ink: #0B322C;
  --bg: #F0F4F3;
  --surface: #FFFFFF;
  --surface2: #F8FAF9;
  --ink: #2C3E3A;
  --muted: #6B7C77;
  --line: #E1E8E6;
  --line2: #EEF2F1;
  --earth: #A9762F;
  --water: #2F7FB5;
  --wind: #1D9E75;
  --fire: #D9542B;
  --ok: #1F9D6B;
  --ok-bg: #E4F3EC;
  --danger: #C93B3B;
  --danger-bg: #FCE8E8;
  --radius: 16px;
  --radius-sm: 8px;
  --shadow: 0 8px 24px rgba(18,77,69,0.06);
}

/* 2. BASE RESET */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; outline: none; }

/* 3. LAYOUT COMPONENTS */
#app-bar { background: var(--surface); color: var(--brand-ink); height: 64px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); z-index: 10; }
.brand-title { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
.brand-title img { height: 40px; width: auto; object-fit: contain; }
.user-badge { display: flex; align-items: center; gap: 16px; font-size: 14px; font-weight: 500; }
.status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.status-pill.online { background: var(--ok-bg); color: var(--ok); }
.status-pill.offline { background: var(--danger-bg); color: var(--danger); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-pill.online .status-dot { background: var(--ok); }
.status-pill.offline .status-dot { background: var(--danger); }
.btn-logout { background: var(--surface2); border: 1px solid var(--line); padding: 8px 16px; color: var(--danger); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
.btn-logout:hover { background: var(--danger-bg); border-color: var(--danger-bg); }

#main-container { display: flex; flex: 1; overflow: hidden; }
#nav-bar { background: var(--surface); width: 260px; border-right: 1px solid var(--line); display: flex; flex-direction: column; padding: 24px 12px; }
#nav-bar a { display: flex; align-items: center; gap: 14px; padding: 14px 20px; margin-bottom: 4px; color: var(--muted); font-weight: 500; border-radius: var(--radius-sm); transition: all 0.2s; }
#nav-bar a:hover { background: var(--bg); color: var(--brand); }
#nav-bar a.active { background: var(--brand-tint); color: var(--brand); font-weight: 600; }
#nav-bar a svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

#view { flex: 1; padding: 40px; overflow-y: auto; overflow-x: hidden; background: var(--bg); position: relative; }
.page-head { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
.page-head h1 { font-size: 24px; font-weight: 700; color: var(--brand-ink); }
.page-head p { color: var(--muted); font-size: 14px; margin-top: 6px; }

/* 4. UI ELEMENTS */
.card { background: var(--surface); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); margin-bottom: 24px; border: 1px solid var(--line2); }
.btn { background: var(--brand); color: #FFF; border: 0; padding: 12px 24px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.btn:hover { background: var(--brand2); transform: translateY(-1px); }
.btn-sec { background: #FFF; color: var(--brand); border: 1px solid var(--line); }
.btn-sec:hover { background: var(--brand-tint); border-color: var(--brand); }

.form-group { margin-bottom: 20px; width: 100%; }
.form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--brand-ink); font-size: 14px; }
input[type="text"], input[type="password"], input[type="date"], select, textarea { width: 100%; padding: 12px 16px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface2); color: var(--ink); transition: all 0.2s; }
input:focus, select:focus { border-color: var(--brand); background: #FFF; box-shadow: 0 0 0 3px var(--brand-tint); }

/* Range Slider */
input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--line); border-radius: 3px; outline: none; margin: 10px 0; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--brand); border-radius: 50%; cursor: pointer; }
.slider-container { margin-bottom: 18px; }
.slider-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink); font-weight: 500; }

table { width: 100%; border-collapse: collapse; text-align: left; }
th { background: var(--surface2); color: var(--brand-ink); font-weight: 600; padding: 16px 24px; border-bottom: 1px solid var(--line); font-size: 14px; }
td { padding: 16px 24px; border-bottom: 1px solid var(--line2); color: var(--ink); font-size: 14px; }
.table-wrapper { width: 100%; overflow-x: auto; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--line2); }

.badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-earth { background: #F3EBE1; color: var(--earth); }
.badge-water { background: #E6F2FA; color: var(--water); }
.badge-wind { background: #E3F5EF; color: var(--wind); }
.badge-fire { background: #FCEEEA; color: var(--fire); }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
.stat-card { background: var(--surface); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--line2); }
.stat-val { font-size: 32px; font-weight: 700; color: var(--brand); }
.stat-lbl { font-size: 14px; color: var(--muted); margin-top: 8px; }

/* 5. LOGIN/REGISTER SYSTEM */
#login-screen { position: fixed; inset: 0; background: var(--brand-ink); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
.login-box { background: #FFF; width: 100%; max-width: 420px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--line); }
.auth-tab { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; color: var(--muted); font-weight: 600; border-bottom: 3px solid transparent; }
.auth-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

/* =========================================================================
   📱 RESPONSIVE (MOBILE & IPAD)
   ========================================================================= */
@media (max-width: 1024px) {
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .dash-grid, .patient-layout { grid-template-columns: 1fr; }
  #nav-bar { width: 220px; }
}
@media (max-width: 768px) {
  #app-bar { flex-direction: column; height: auto; padding: 15px; gap: 10px; text-align: center; }
  .brand-title { flex-direction: column; }
  .user-badge { width: 100%; justify-content: center; flex-wrap: wrap; }
  #main-container { flex-direction: column; padding-bottom: 80px; } 
  #nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: auto; flex-direction: row; padding: 10px; border-right: none; border-top: 1px solid var(--line); z-index: 999; }
  #nav-bar a { flex-direction: column; padding: 8px; font-size: 10px; flex: 1; gap: 5px; }
  #view { padding: 15px; }
  .stat-row { grid-template-columns: 1fr; }
  .page-head h1 { font-size: 20px; }
}
</style>
</head>

<script>
// ==========================================
// 1. CORE STATE & DATA ISOLATION (FIXED)
// ==========================================
const store = {
  get(k, d) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch(e){ return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
};

const DB = {
  session() { return store.get('rtle_session', null); },
  saveSession(s) { store.set('rtle_session', s); },
  
  // 🔥 แยกข้อมูลตาม User
  async patients() {
    const user = this.session()?.user || 'guest';
    if (IS_ONLINE) { try { const { data } = await sb.from('patients').select('*').order('hn', { ascending: true }); if (data) return data; } catch(e) {} }
    return store.get(`rtle_patients_${user}`, []);
  },
  async savePatients(pList) {
    const user = this.session()?.user || 'guest';
    store.set(`rtle_patients_${user}`, pList);
    if (IS_ONLINE) { try { for(let p of pList) { await sb.from('patients').upsert(p); } } catch(e) {} }
  },
  async assessments() {
    const user = this.session()?.user || 'guest';
    if (IS_ONLINE) { try { const { data } = await sb.from('assessments').select('*').order('created_at', { ascending: false }); if (data) return data.map(r => ({ ...r.data, id: r.id })); } catch(e) {} }
    return store.get(`rtle_assessments_${user}`, []);
  },
  async saveAssessments(updatedList) {
    const user = this.session()?.user || 'guest';
    store.set(`rtle_assessments_${user}`, updatedList);
    const latest = updatedList[0];
    if (IS_ONLINE && latest) { try { await sb.from('assessments').insert({ id: latest.id, hn: latest.hn, name: latest.name, rsi: latest.rsi, data: latest }); } catch(e) {} }
  }
};

// RTLE CONSTANTS (MATHEMATICAL MODEL)
const C0 = { earth: 0.60, water: 0.60, wind: 0.55, fire: 0.50 };
const M = {
  earth: { s: 0.30,  e: -0.10, f: 0.40,  a: -0.30 },
  water: { s: 0.20,  e: -0.10, f: 0.30,  a: -0.30 },
  wind:  { s: -0.30, e: 0.50,  f: -0.10, a: 0.40 },
  fire:  { s: -0.40, e: 0.30,  f: 0.20,  a: 0.60 }
};

let CURRENT_ROUTE = 'dashboard';
let CURRENT_PATIENT = null;
let ASSESS_STEP = 1;
let LAST_RESULT = null;
let AUTH_MODE = 'login';

const $ = (sel) => document.querySelector(sel);
function getElKey(s) { return s?s.includes('ดิน')?'earth':s.includes('น้ำ')?'water':s.includes('ลม')?'wind':s.includes('ไฟ')?'fire':'earth':'earth'; }
function uid(p='') { return p + Math.random().toString(36).substring(2,9); }

// ==========================================
// 2. AUTHENTICATION (REGISTER & LOGIN)
// ==========================================
function setAuthMode(mode) {
  AUTH_MODE = mode;
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  $(`#tab-${mode}`).classList.add('active');
  $('#btn-auth').textContent = mode === 'login' ? 'เข้าสู่ระบบ' : 'ลงทะเบียนและเข้าใช้';
}

function handleAuth(e) {
  e.preventDefault();
  const u = $('#login-user').value.trim();
  const p = $('#login-pass').value.trim();
  let users = store.get('rtle_users', { 'admin': '1234' });

  if (AUTH_MODE === 'register') {
    if (users[u]) return alert('ชื่อนี้มีคนใช้แล้ว');
    users[u] = p;
    store.set('rtle_users', users);
    alert('ลงทะเบียนสำเร็จ');
  } else {
    if (users[u] !== p) return alert('รหัสผ่านไม่ถูกต้อง');
  }
  
  DB.saveSession({ user: u });
  initApp();
}

function handleLogout() { DB.saveSession(null); initApp(); }

// ==========================================
// 3. NAVIGATION & VIEW RENDERING
// ==========================================
async function go(route) {
  CURRENT_ROUTE = route;
  document.querySelectorAll('#nav-bar a').forEach(a => a.classList.toggle('active', a.dataset.route === route));
  const views = { dashboard: renderDashboard, patients: renderPatients, assess: renderAssess, records: renderRecords };
  if (views[route]) await views[route]();
}

async function renderDashboard() {
  const A = await DB.assessments(); const P = await DB.patients();
  const todayCount = A.filter(a => new Date(a.date).toDateString() === new Date().toDateString()).length;
  let avgRSI = A.length ? A.reduce((s,a) => s + (a.rsi||0), 0) / A.length : 100;

  $('#view').innerHTML = `
    <div class="page-head">
      <div><h1>แดชบอร์ดสุขภาพ</h1><p>Resonance of Thai Life Elements Analysis</p></div>
      <button class="btn" onclick="ASSESS_STEP=1;go('assess')">เริ่มเคสใหม่</button>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-val">${P.length}</div><div class="stat-lbl">ผู้ป่วยรวม</div></div>
      <div class="stat-card"><div class="stat-val">${A.length}</div><div class="stat-lbl">ประวัติการตรวจ</div></div>
      <div class="stat-card"><div class="stat-val">${todayCount}</div><div class="stat-lbl">ประเมินวันนี้</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--brand2)">${avgRSI.toFixed(1)}%</div><div class="stat-lbl">RSI เฉลี่ย</div></div>
    </div>
    <div class="dash-grid">
      <div class="card" style="padding:0;"><h3 style="margin:20px;">ผู้ป่วยล่าสุด</h3>
        <div class="table-wrapper" style="border:0;">
          <table><thead><tr><th>HN</th><th>ชื่อ</th><th>ธาตุเกิด</th></tr></thead>
          <tbody>${P.slice(-3).reverse().map(p => `<tr><td>${p.hn}</td><td>${p.name}</td><td><span class="badge badge-${getElKey(p.constitution)}">${p.constitution}</span></td></tr>`).join('')}</tbody></table>
        </div>
      </div>
      <div class="card" style="padding:0;"><h3 style="margin:20px;">ผลประเมินล่าสุด</h3>
        <div class="table-wrapper" style="border:0;">
          <table><thead><tr><th>ชื่อ</th><th>RSI</th><th>สถานะ</th></tr></thead>
          <tbody>${A.slice(0,3).map(a => `<tr><td>${a.name}</td><td>${a.rsi.toFixed(1)}%</td><td>${a.dominantTh}</td></tr>`).join('')}</tbody></table>
        </div>
      </div>
    </div>
  `;
}

async function renderPatients() {
  const P = await DB.patients();
  $('#view').innerHTML = `
    <div class="page-head"><h1>ทะเบียนผู้ป่วย</h1></div>
    <div class="dash-grid">
      <div class="card"><h3>ลงทะเบียนใหม่</h3>
        <form onsubmit="savePatient(event)">
          <div class="form-group"><label>HN</label><input type="text" id="p-hn" required></div>
          <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="p-name" required></div>
          <div class="form-group"><label>วันเกิด</label><input type="date" id="p-birth" required onchange="autoCalcConstitution()"></div>
          <div class="form-group"><label>ธาตุเจ้าเรือน</label>
            <select id="p-constitution">
              <option value="ดิน">ดิน</option><option value="น้ำ">น้ำ</option><option value="ลม">ลม</option><option value="ไฟ">ไฟ</option>
            </select>
          </div>
          <button class="btn" style="width:100%">บันทึกประวัติ</button>
        </form>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrapper" style="border:0;">
          <table><thead><tr><th>HN</th><th>ชื่อ</th><th>จัดการ</th></tr></thead>
          <tbody>${P.map(p => `<tr><td>${p.hn}</td><td>${p.name}</td><td><button class="btn btn-sec" onclick="startAssess('${p.id}')">ตรวจธาตุ</button></td></tr>`).join('')}</tbody></table>
        </div>
      </div>
    </div>
  `;
}

function autoCalcConstitution() {
  const m = new Date($('#p-birth').value).getMonth() + 1;
  $('#p-constitution').value = [6,7,8].includes(m)?'น้ำ':[9,10,11].includes(m)?'ลม':[12,1,2].includes(m)?'ไฟ':'ดิน';
}

async function savePatient(e) {
  e.preventDefault();
  let P = await DB.patients();
  P.push({ id: uid('p_'), hn:$('#p-hn').value, name:$('#p-name').value, birth:$('#p-birth').value, constitution:$('#p-constitution').value });
  await DB.savePatients(P);
  renderPatients();
}

// ==========================================
// 4. ASSESSMENT & MATH (RTLE MODEL)
// ==========================================
async function renderAssess() {
  $('#view').innerHTML = `<div class="page-head"><h1>จำลองสภาวะสมดุลธาตุ</h1></div><div id="assess-content"></div>`;
  if(ASSESS_STEP === 1) renderStep1();
  else if(ASSESS_STEP === 2) renderStep2();
  else renderStep3();
}

async function renderStep1() {
  const P = await DB.patients();
  $('#assess-content').innerHTML = `
    <div class="card" style="max-width:500px; margin:auto;">
      <h3 style="text-align:center; margin-bottom:20px;">เลือกผู้ป่วย</h3>
      <select id="sel-p" style="margin-bottom:20px;">
        <option value="">-- ตรวจด่วน (ระบุชื่อด้านล่าง) --</option>
        ${P.map(p => `<option value="${p.id}">${p.hn} - ${p.name}</option>`).join('')}
      </select>
      <input type="text" id="quick-name" placeholder="ชื่อผู้รับการตรวจ (กรณีตรวจด่วน)" style="margin-bottom:20px;">
      <button class="btn" style="width:100%" onclick="submitStep1()">ถัดไป</button>
    </div>
  `;
}

async function startAssess(id) {
  const P = await DB.patients();
  CURRENT_PATIENT = P.find(x => x.id === id);
  ASSESS_STEP = 2; go('assess');
}

function submitStep1() {
  const id = $('#sel-p').value;
  if(id) {
    DB.patients().then(P => {
      CURRENT_PATIENT = P.find(x => x.id === id);
      ASSESS_STEP = 2; renderAssess();
    });
  } else {
    if(!$('#quick-name').value) return alert('กรุณาเลือกชื่อ');
    CURRENT_PATIENT = { id:'raw', name:$('#quick-name').value, constitution:'ดิน', hn:'-' };
    ASSESS_STEP = 2; renderAssess();
  }
}

function renderStep2() {
  $('#assess-content').innerHTML = `
    <div class="card" style="background:var(--brand-tint); border:1px solid var(--brand); margin-bottom:15px;">
      <b>กำลังตรวจ:</b> ${CURRENT_PATIENT.name} (ธาตุเจ้าเรือน: ${CURRENT_PATIENT.constitution})
    </div>
    <div class="card">
      <h4 style="margin-bottom:20px;">ป้อนค่าเวกเตอร์พฤติกรรม (0.0 - 1.0)</h4>
      <div class="slider-container"><label>S (Sleep) - การนอน: <b id="vs">0.50</b></label><input type="range" id="b-s" min="0" max="1" step="0.01" value="0.5" oninput="$('#vs').textContent=this.value"></div>
      <div class="slider-container"><label>E (Exercise) - การเคลื่อนไหว: <b id="ve">0.50</b></label><input type="range" id="b-e" min="0" max="1" step="0.01" value="0.5" oninput="$('#ve').textContent=this.value"></div>
      <div class="slider-container"><label>F (Food) - อาหาร: <b id="vf">0.50</b></label><input type="range" id="b-f" min="0" max="1" step="0.01" value="0.5" oninput="$('#vf').textContent=this.value"></div>
      <div class="slider-container"><label>A (Activity) - ความเครียด: <b id="va">0.50</b></label><input type="range" id="b-a" min="0" max="1" step="0.01" value="0.5" oninput="$('#va').textContent=this.value"></div>
      <button class="btn" style="width:100%; margin-top:20px;" onclick="calculateRTLE()">ประมวลผลโมเดลคณิตศาสตร์</button>
    </div>
  `;
}

async function calculateRTLE() {
  const B = { s: +$('#b-s').value, e: +$('#b-e').value, f: +$('#b-f').value, a: +$('#b-a').value };
  const B_ideal = { s: 0.85, e: 0.80, f: 0.85, a: 0.45 }; // Baseline ตามเปเปอร์
  
  const d = { s: B.s-B_ideal.s, e: B.e-B_ideal.e, f: B.f-B_ideal.f, a: B.a-B_ideal.a };
  const clip = v => Math.min(Math.max(v, 0), 1);

  const C = {
    earth: clip(C0.earth + (M.earth.s*d.s + M.earth.e*d.e + M.earth.f*d.f + M.earth.a*d.a)),
    water: clip(C0.water + (M.water.s*d.s + M.water.e*d.e + M.water.f*d.f + M.water.a*d.a)),
    wind:  clip(C0.wind  + (M.wind.s*d.s  + M.wind.e*d.e  + M.wind.f*d.f  + M.wind.a*d.a)),
    fire:  clip(C0.fire  + (M.fire.s*d.s  + M.fire.e*d.e  + M.fire.f*d.f  + M.fire.a*d.a))
  };

  const d2 = (Math.pow(C.earth-C0.earth,2)+Math.pow(C.water-C0.water,2)+Math.pow(C.wind-C0.wind,2)+Math.pow(C.fire-C0.fire,2))/4;
  const rsi = Math.exp(-7 * d2) * 100;

  const devs = [
    { n:'ดิน', v: C.earth-C0.earth }, { n:'น้ำ', v: C.water-C0.water },
    { n:'ลม', v: C.wind-C0.wind }, { n:'ไฟ', v: C.fire-C0.fire }
  ].sort((a,b) => Math.abs(b.v) - Math.abs(a.v));

  LAST_RESULT = {
    id: uid('rec_'), name: CURRENT_PATIENT.name, hn: CURRENT_PATIENT.hn, date: new Date().toISOString(),
    rsi: rsi, dominantTh: `ธาตุ${devs[0].n}${devs[0].v>0?'กำเริบ':'หย่อน'}`, data: C
  };

  let A = await DB.assessments(); A.unshift(LAST_RESULT);
  await DB.saveAssessments(A);
  ASSESS_STEP = 3; renderAssess();
}

function renderStep3() {
  const c = LAST_RESULT.data;
  $('#assess-content').innerHTML = `
    <div class="card" style="text-align:center;">
      <h2 style="color:var(--brand)">RSI Index: ${LAST_RESULT.rsi.toFixed(2)}%</h2>
      <p style="margin:10px 0;">สถานะ: <b>${LAST_RESULT.dominantTh}</b></p>
      
      <div style="margin-top:25px; text-align:left;">
        <label>Earth: ${c.earth.toFixed(2)}</label><div style="height:10px; background:#ddd; border-radius:5px;"><div style="width:${c.earth*100}%; background:var(--earth); height:100%; border-radius:5px;"></div></div>
        <label>Water: ${c.water.toFixed(2)}</label><div style="height:10px; background:#ddd; border-radius:5px;"><div style="width:${c.water*100}%; background:var(--water); height:100%; border-radius:5px;"></div></div>
        <label>Wind: ${c.wind.toFixed(2)}</label><div style="height:10px; background:#ddd; border-radius:5px;"><div style="width:${c.wind*100}%; background:var(--wind); height:100%; border-radius:5px;"></div></div>
        <label>Fire: ${c.fire.toFixed(2)}</label><div style="height:10px; background:#ddd; border-radius:5px;"><div style="width:${c.fire*100}%; background:var(--fire); height:100%; border-radius:5px;"></div></div>
      </div>
      
      <button class="btn" style="width:100%; margin-top:30px;" onclick="ASSESS_STEP=1;go('assess')">เสร็จสิ้น</button>
    </div>
  `;
}

async function renderRecords() {
  const A = await DB.assessments();
  $('#view').innerHTML = `
    <div class="page-head"><h1>ประวัติการตรวจสะสม</h1></div>
    <div class="table-wrapper">
      <table><thead><tr><th>วันที่</th><th>ชื่อ</th><th>RSI</th><th>ผลตรวจ</th></tr></thead>
      <tbody>${A.map(a => `<tr><td>${new Date(a.date).toLocaleDateString()}</td><td>${a.name}</td><td style="font-weight:bold; color:var(--brand)">${a.rsi.toFixed(1)}%</td><td>${a.dominantTh}</td></tr>`).join('')}</tbody></table>
    </div>
  `;
}

async function initApp() {
  const ss = DB.session();
  if(ss) {
    $('#login-screen').style.display='none';
    $('#user-name-display').textContent = ss.user;
    await go('dashboard');
  } else {
    $('#login-screen').style.display='flex';
  }
}

window.addEventListener('DOMContentLoaded', initApp);
